# supplychain-kit CLI configuration.
# All values can be overridden by ASPM_-prefixed environment variables
# (dots become underscores, e.g. ASPM_SCANNERS_WORK_DIR).

scanners:
  work_dir: "/tmp/aspm-work"
  max_parallel_syft: 4
  max_parallel_grype: 4
  max_parallel_sast: 2
  grype_db_max_age_hrs: 24

# Quality Gate policy. CLI exits 2 when fail_on triggers, 1 when warn_on triggers.
quality_gate:
  fail_on:
    - severity: critical
  warn_on:
    - severity: high

# Dependency-Track integration (optional).
# Used by: supplychain-kit deptrack upload/status/sync
# Can also be set via --url and --api-key flags instead.
#
# dependency_track:
#   url: "https://deptrack.example.com"
#   api_key: "your-api-key"
#   default_project: "myapp"
#   default_version: "latest"

# DefectDojo integration (optional).
# Used by: supplychain-kit defectdojo push
# Can also be set via --url and --api-key flags instead.
#
# defect_dojo:
#   url: "https://dojo.example.com"
#   api_key: "your-api-token"
#   default_product_id: 1
