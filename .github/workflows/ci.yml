name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  go:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with: { go-version: '1.26', check-latest: true }
      - run: go vet ./...
      - run: go test ./... -count=1

  self-scan:
    runs-on: ubuntu-latest
    needs: go
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with: { go-version: '1.26', check-latest: true }
      - name: Install scanners
        run: |
          curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh  | sh -s -- -b /usr/local/bin
          curl -sSfL https://raw.githubusercontent.com/anchore/grype/main/install.sh | sh -s -- -b /usr/local/bin
          pipx install semgrep
      - name: Build supplychain-kit
        run: go build -o bin/supplychain-kit ./cmd/supplychain-kit
      - name: Self-scan
        run: ./bin/supplychain-kit scan --repo . --out findings.json
      - name: Quality Gate
        run: |
          ./bin/supplychain-kit gate --findings findings.json --policy configs/policy-moderate.yaml || true
          echo "Gate result above is informational — CI does not block on WARN"
