name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  go:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with: { go-version: '1.26', check-latest: true }
      - run: go vet ./...
      - run: go test ./... -count=1

  self-scan:
    runs-on: ubuntu-latest
    needs: go
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with: { go-version: '1.26', check-latest: true }
      - name: Install scanners
        run: |
          retry() { for i in 1 2 3; do "$@" && return 0; echo "retry $i/3 failed"; sleep 5; done; return 1; }
          retry sh -c 'curl -sSfL --retry 2 -o /tmp/syft_install.sh https://raw.githubusercontent.com/anchore/syft/main/install.sh && sh /tmp/syft_install.sh -b /usr/local/bin v1.43.0'
          retry sh -c 'curl -sSfL --retry 2 -o /tmp/grype_install.sh https://raw.githubusercontent.com/anchore/grype/main/install.sh && sh /tmp/grype_install.sh -b /usr/local/bin v0.111.1'
          pipx install semgrep
      - name: Build supplychain-kit
        run: go build -o bin/supplychain-kit ./cmd/supplychain-kit
      - name: Self-scan
        run: ./bin/supplychain-kit scan --repo . --out findings.json
      - name: Quality Gate
        run: |
          ./bin/supplychain-kit gate --findings findings.json --policy configs/policy-moderate.yaml || true
          echo "Gate result above is informational — CI does not block on WARN"
